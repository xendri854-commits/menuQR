<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мангал House</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#1e1e1e;
    color:white;
}
header{
    background:#b22222;
    padding:20px;
    text-align:center;
}
.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}
.section{
    background:#2d2d2d;
    margin-bottom:20px;
    border-radius:10px;
    padding:15px;
}
h2{
    color:#ffcc00;
}
.item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #444;
}
.item:last-child{
    border-bottom:none;
}
.price{
    color:#00ff88;
    font-weight:bold;
}
footer{
    text-align:center;
    padding:20px;
    color:#aaa;
}
</style>
</head>
<body>

<header>
    <h1>🔥 Мангал House</h1>
    <p>Свежий шашлык на углях</p>
</header>

<div class="container">

    <div class="section">
        <h2>🍖 Шашлык</h2>

        <div class="item">
            <span>Шашлык из свинины</span>
            <span class="price">2500</span>
        </div>

        <div class="item">
            <span>Шашлык из курицы</span>
            <span class="price">1800</span>
        </div>

        <div class="item">
            <span>Шашлык из баранины</span>
            <span class="price">3200</span>
        </div>
    </div>

    <div class="section">
        <h2>🥩 Люля-кебаб</h2>

        <div class="item">
            <span>Говядина</span>
            <span class="price">2200</span>
        </div>

        <div class="item">
            <span>Баранина</span>
            <span class="price">2600</span>
        </div>
    </div>

    <div class="section">
        <h2>🥤 Напитки</h2>

        <div class="item">
            <span>Coca-Cola 0.5</span>
            <span class="price">700</span>
        </div>

        <div class="item">
            <span>Сок</span>
            <span class="price">600</span>
        </div>
    </div>

</div>

<footer>
    Телефон для заказа: +7 XXX XXX XX XX
</footer>

</body>
</html>
